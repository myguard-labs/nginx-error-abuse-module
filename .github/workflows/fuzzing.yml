name: Fuzzing

# Fast fuzz regression gate on every PR/push — 120s/target on the status-list
# + snapshot validators, kept short so PR feedback stays quick. Long discovery
# fuzz (hours/target) lives in ci-deep.yml (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: ""

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

concurrency:
  group: fuzzing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s/target)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 30
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Run each target 120s
        run: |
          set -euo pipefail
          cd fuzz
          # target:corpus[:dict] — snapshot is binary (no dict); statuses is a
          # token grammar (HTTP status codes / range punctuation) so it gets one.
          targets="fuzz_snapshot:corpus: fuzz_statuses:corpus_statuses:fuzz.dict"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            args=(-max_total_time=120 -print_final_stats=1 -artifact_prefix="crash-${bin}-")
            [ -n "$dict" ] && args+=("-dict=$dict")
            echo "=== $bin over $corp (120s)${dict:+ +dict} ==="
            set +e
            "./$bin" "${args[@]}" "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in 120s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14
