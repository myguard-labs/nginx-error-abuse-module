name: Fuzzing

# Coverage-guided fuzzing of the on-disk snapshot validator
# (ngx_http_error_abuse_validate_snapshot). Monthly discovery run, plus
# manual dispatch — kept off PR feedback on purpose.
#
# Action pins (see build-test.yml for rationale):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

on:
  schedule:
    # Monthly, 1st @ 03:41 UTC — discovery run, longer budget, no one waiting.
    - cron: "41 3 1 * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration in seconds"
        required: false
        default: "900"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Snapshot validator fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Select fuzz duration
        run: |
          # Monthly / dispatch: long. PR regression run: short and bounded.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "FUZZ_SECS=120" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FUZZ_SECS=${{ github.event.inputs.duration }}" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECS=900" >> "$GITHUB_ENV"
          fi

      - name: Run fuzzers
        run: |
          cd fuzz
          # target:corpus-dir pairs — each gets the full per-target budget.
          targets="fuzz_snapshot:corpus fuzz_statuses:corpus_statuses"
          for t in $targets; do
            bin="${t%%:*}"; corp="${t##*:}"
            echo "=== $bin over $corp ($FUZZ_SECS s) ==="
            set +e
            "./$bin" \
              -max_total_time="$FUZZ_SECS" \
              -print_final_stats=1 \
              -artifact_prefix="crash-${bin}-" \
              "$corp/"
            rc=$?
            set -e
            if [ $rc -ne 0 ]; then
              echo "❌ $bin found a crash (exit $rc)"
              exit 1
            fi
            echo "✓ $bin: no crashes in ${FUZZ_SECS}s"
          done

      - name: Minimize and persist corpus growth
        if: success() && github.event_name == 'schedule'
        run: |
          cd fuzz
          for t in fuzz_snapshot:corpus fuzz_statuses:corpus_statuses; do
            bin="${t%%:*}"; corp="${t##*:}"
            mkdir -p "${corp}-min"
            "./$bin" -merge=1 "${corp}-min/" "$corp/"
            echo "Merged $corp: $(find "${corp}-min" -type f | wc -l) units"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-crashes
          path: |
            ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success() && github.event_name == 'schedule'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/fuzz/*-min
          retention-days: 30
