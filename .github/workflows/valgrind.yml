name: Valgrind

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 3 1 * *"
  workflow_dispatch: {}

concurrency:
  group: valgrind-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck:
    name: Memcheck
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev valgrind zlib1g-dev

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run runtime suite under Memcheck
        run: |
          runner="valgrind --tool=memcheck --track-origins=yes --leak-check=full"
          runner="$runner --show-leak-kinds=definite,indirect"
          runner="$runner --errors-for-leak-kinds=none --error-exitcode=99"
          runner="$runner --log-file=$GITHUB_WORKSPACE/valgrind-%p.log"
          python3 tools/test_runtime.py \
            --single-process \
            --runner "$runner" \
            --nginx-binary "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" \
            --module "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/ngx_http_error_abuse_module.so"

      - name: Verify Memcheck reports
        if: always()
        run: |
          cat valgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' valgrind-*.log; then
            exit 1
          fi
          grep -Eq 'ERROR SUMMARY: 0 errors' valgrind-*.log

      - name: Upload Memcheck reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: valgrind-reports
          path: valgrind-*.log
          retention-days: 14
