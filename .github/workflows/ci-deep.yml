name: CI Deep

# Exhaustive dynamic analysis — monthly cron + on-demand only, NEVER on PR.
# The PR-time gates live in the standalone fuzzing.yml (fast fuzz regression),
# valgrind.yml (memcheck lite soak) and security-scanners.yml workflows; THIS
# file remains the exhaustive monthly+dispatch sweep. codeql.yml is dropped
# entirely: CodeQL / the GitHub Security tab is GitHub-Advanced-Security only
# and does nothing on a private repo, so the SARIF-upload path is removed too
# — the scanners still run and GATE on findings, they just don't upload.
#
# Jobs: fuzz (14400s/target) · memcheck soak · helgrind soak · scanners.
#   * memcheck AND helgrind run under tools/soak.sh, which passes
#     --suppressions=tools/valgrind.supp for BOTH tools and --error-exitcode=99
#     (see tools/soak.sh) — the drift-fix baseline for every module.
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: ""

on:
  schedule:
    # Monthly, day 4 @ 03:30 UTC — staggered per repo so ci-deep runs
    # don't pile up on the shared self-hosted runners.
    - cron: "30 3 4 * *"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Per-target fuzz duration (seconds)"
        required: false
        default: "3600"

concurrency:
  group: ci-deep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (all targets, long)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 600
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Select fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FUZZ_SECS=${{ github.event.inputs.fuzz_seconds }}" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECS=3600" >> "$GITHUB_ENV"
          fi

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Fuzz each target
        run: |
          set -euo pipefail
          cd fuzz
          # target:corpus[:dict] — snapshot is binary (no dict); statuses is a
          # token grammar so it gets the status-code/range dictionary.
          targets="fuzz_snapshot:corpus: fuzz_statuses:corpus_statuses:fuzz.dict"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            args=(-max_total_time="$FUZZ_SECS" -print_final_stats=1 -artifact_prefix="crash-${bin}-")
            [ -n "$dict" ] && args+=("-dict=$dict")
            echo "=== $bin over $corp (${FUZZ_SECS}s)${dict:+ +dict} ==="
            set +e
            "./$bin" "${args[@]}" "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in ${FUZZ_SECS}s"
            mkdir -p "${corp}-min"
            "./$bin" -merge=1 "${corp}-min/" "$corp/"
            echo "merged $corp: $(find "${corp}-min" -type f | wc -l) units"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-deep-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/fuzz/*-min
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / fuzz FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  memcheck:
    name: Valgrind Memcheck soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Resolve latest mainline nginx
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' | sort -V | tail -1)
          [ -n "$ver" ] || { echo "::error::cannot resolve nginx version"; exit 1; }
          echo "NGINX_VERSION=$ver" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libhiredis-dev libpcre2-dev libssl-dev \
            pkg-config valgrind wget zlib1g-dev
      - name: Build debug nginx + error-abuse module
        run: |
          set -euo pipefail
          test -f "nginx-${NGINX_VERSION}.tar.gz" || wget -q -O "nginx-${NGINX_VERSION}.tar.gz" \
            "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"; cd "nginx-${NGINX_VERSION}"
          ./configure \
            --with-compat --with-debug --with-threads --with-file-aio \
            --with-http_ssl_module --with-http_v2_module \
            --with-http_realip_module --without-http_rewrite_module \
            --with-cc-opt="-DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables" \
            --add-module="$GITHUB_WORKSPACE"
          make -j"$(nproc)"
      - name: Memcheck soak (600s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/nginx-${NGINX_VERSION}/objs/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / memcheck FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  helgrind:
    name: Valgrind Helgrind soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Resolve latest mainline nginx
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' | sort -V | tail -1)
          [ -n "$ver" ] || { echo "::error::cannot resolve nginx version"; exit 1; }
          echo "NGINX_VERSION=$ver" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libhiredis-dev libpcre2-dev libssl-dev \
            pkg-config valgrind wget zlib1g-dev
      - name: Build debug nginx + error-abuse module
        run: |
          set -euo pipefail
          test -f "nginx-${NGINX_VERSION}.tar.gz" || wget -q -O "nginx-${NGINX_VERSION}.tar.gz" \
            "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"; cd "nginx-${NGINX_VERSION}"
          ./configure \
            --with-compat --with-debug --with-threads --with-file-aio \
            --with-http_ssl_module --with-http_v2_module \
            --with-http_realip_module --without-http_rewrite_module \
            --with-cc-opt="-DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables" \
            --add-module="$GITHUB_WORKSPACE"
          make -j"$(nproc)"
      - name: Helgrind soak (600s @ 4 conc, --error-exitcode=99, WITH suppressions)
        env:
          USE_HELGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/nginx-${NGINX_VERSION}/objs/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / helgrind FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  scanners:
    name: Security scanners
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flawfinder clang-tidy python3 python3-pip pipx nginx-dev libhiredis-dev
          # semgrep: isolate via pipx (PEP 668 blocks a bare pip3 install into the
          # system Python on the Ubuntu 24.04 self-hosted runner). Fall back to a
          # user pip install with --break-system-packages if pipx is unavailable.
          if command -v pipx >/dev/null; then
            pipx install --quiet semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Configure nginx src tree (clang-tidy headers)
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' | sort -V | tail -1)
          wget -q "https://nginx.org/download/nginx-${ver}.tar.gz"
          tar -xzf "nginx-${ver}.tar.gz"; cd "nginx-${ver}"
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" >/dev/null
          echo "NGINX_SRC_TREE=$PWD" >> "$GITHUB_ENV"
      - name: flawfinder
        run: |
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/ngx_http_error_abuse_module.c" 2>&1 | tee flawfinder.log
          # Gate on any high-severity (level >= 4) finding.
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE/ngx_http_error_abuse_module.c" \
               2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "✗ flawfinder: high-severity (>=4) findings present" >&2
            exit 1
          fi
          echo "✓ flawfinder: clean at level >= 4"
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules -I$N/src/event/quic \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules -I$N/src/http/v2 -I/usr/include"
          # shellcheck disable=SC2086,SC2046
          clang-tidy "$GITHUB_WORKSPACE/ngx_http_error_abuse_module.c" \
            --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
            --warnings-as-errors='*' \
            -- $INCLUDES $(pkg-config --cflags hiredis 2>/dev/null) \
            2>&1 | tee clang-tidy.log
      - name: semgrep
        run: |
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/ngx_http_error_abuse_module.c" 2>&1 | tee semgrep.log || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
